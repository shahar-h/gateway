name: Release

permissions:
  contents: read

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*.*.*"
      # Exclude rc.0 tags — they’re not real release candidates but markers for main
      # See: https://github.com/envoyproxy/gateway/issues/7248
      - "!v*.*.*-rc.0"


jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Verify Build and Test Success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use the specific filename found in the envoyproxy/gateway repo
          RUN=$(gh run list \
            --workflow build_and_test.yaml \
            --commit ${{ github.sha }} \
            --limit 1 \
            --json status,conclusion \
            --jq '.[0]')

          # Handle the case where the workflow hasn't even started yet
          if [ "$RUN" = "null" ] || [ -z "$RUN" ]; then
            echo "❌ ERROR: No 'Build and Test' workflow run found for this commit."
            echo "This usually means the tests haven't been triggered yet."
            exit 1
          fi

          STATUS=$(echo "$RUN" | jq -r '.status')
          CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')

          # Handle the 'In Progress' case clearly
          if [ "$STATUS" != "completed" ]; then
            echo "⚠️  FAILURE: The latest test run is still in state: '$STATUS'."
            echo "Release aborted. Please wait for CI to finish and try again."
            exit 1
          fi

          # Handle the 'Failed' or 'Cancelled' case
          if [ "$CONCLUSION" != "success" ]; then
            echo "❌ ERROR: The latest test run finished with conclusion: '$CONCLUSION'."
            echo "Release aborted. You can only release code that passes all tests."
            exit 1
          fi

          echo "✅ SUCCESS: The latest 'Build and Test' workflow succeeded."

  # For push event, we run benchmark test here because we need to
  # include benchmark report in the release.
  benchmark-test:
    needs: [verify-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder
        run: echo "Benchmark test placeholder - skipped for fast check"

  release:
    runs-on: ubuntu-22.04
    needs: [benchmark-test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - uses: ./tools/github-actions/reclaim-storage

      - name: Placeholder
        run: echo "Release steps placeholder - verification passed"
