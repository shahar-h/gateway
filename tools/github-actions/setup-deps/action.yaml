name: setup-deps
description: Install host system dependencies

runs:
  using: composite
  steps:
    - shell: bash
      run: sudo apt-get install libbtrfs-dev -y
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.2
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: |
          go.sum
          tools/go.sum
          test/go.sum
    - shell: bash
      name: Pre-populate Go module cache for all workspaces
      run: |
        for dir in . tools test; do
          (cd "$dir" && go mod download)
        done
